<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리아기 성장 발달 트래커</title>
    
    <!-- PWA 및 모바일 홈 화면 아이콘 설정 -->
    <!-- 1. 앱 이름 짧게 설정 (홈 화면 표시용) -->
    <meta name="apple-mobile-web-app-title" content="발달트래커">
    <meta name="application-name" content="발달트래커">
    <!-- 2. 테마 색상 (상태바 및 브라우저 색상) -->
    <meta name="theme-color" content="#fde68a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- 3. 앱 아이콘 -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .checkbox-custom:checked + div { background-color: #10b981; border-color: #10b981; }
        .checkbox-custom:checked + div svg { opacity: 1; }
        .line-through-custom { text-decoration: line-through; color: #9ca3af; }

        /* 하드웨어 가속을 활용하는 순수 CSS 애니메이션 정의 */
        @keyframes slideInRight {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutLeft {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(-30%); opacity: 0; }
        }
        @keyframes slideInLeft {
            0% { transform: translateX(-100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(30%); opacity: 0; }
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<!-- 디버깅 반영: body의 높이를 화면에 고정(100dvh)하고 글로벌 스크롤을 막음(overflow-hidden) -->
<body class="flex justify-center h-[100dvh] text-gray-800 overflow-hidden sm:bg-gray-200 sm:py-4">

    <!-- Mobile App Container: h-full을 적용하여 내부에서만 스크롤이 발생하도록 구조 변경 -->
    <div class="w-full max-w-md bg-gray-50 h-full shadow-lg relative flex flex-col sm:rounded-[2rem] sm:border sm:border-gray-300 overflow-hidden">
        
        <!-- Header -->
        <header class="bg-yellow-100 px-5 py-4 rounded-b-3xl shadow-sm z-10 shrink-0">
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-baby text-yellow-600"></i> 우리아기 발달 트래커
            </h1>
        </header>

        <!-- Navigation & Info Area -->
        <div class="px-4 pt-3 pb-2 shrink-0 space-y-2">

            <!-- 아기 정보 카드 (접기/펼치기) -->
            <div class="bg-white rounded-xl shadow-sm border border-yellow-200">

                    <i id="info-chevron" class="fa-solid fa-chevron-down text-gray-400 text-xs transition-transform duration-200 rotate-180"></i>
                </button>
                <div id="info-panel" class="border-t border-yellow-100 px-3 pb-3 pt-2 space-y-2">
                    <!-- 생일 + 성별 -->
                    <div class="flex items-center justify-between px-1 py-1">
                        <span class="text-sm font-bold text-gray-700 flex items-center gap-2">
                            <i class="fa-solid fa-cake-candles text-pink-400"></i> 아기 생일
                        </span>
                        <input type="date" id="birth-date" class="text-sm text-gray-600 outline-none bg-transparent cursor-pointer font-medium">
                    </div>
                    <div class="flex items-center justify-between px-1 py-1">
                        <span class="text-sm font-bold text-gray-700 flex items-center gap-2">
                            <i class="fa-solid fa-venus-mars text-purple-400"></i> 성별
                        </span>
                        <div class="flex gap-2">
                            <button id="btn-male" class="sex-btn text-xs font-bold px-3 py-1 rounded-full border transition-all" data-sex="male">
                                <i class="fa-solid fa-mars mr-1"></i>남아
                            </button>
                            <button id="btn-female" class="sex-btn text-xs font-bold px-3 py-1 rounded-full border transition-all" data-sex="female">
                                <i class="fa-solid fa-venus mr-1"></i>여아
                            </button>
                        </div>
                    </div>

                    <!-- 체중 그룹 -->
                    <div class="bg-green-50 rounded-xl border border-green-100 divide-y divide-green-100">
                        <div class="flex items-center justify-between px-3 py-2.5">
                            <span class="text-sm font-bold text-gray-700 flex items-center gap-2">
                                <i class="fa-solid fa-weight-scale text-green-500"></i> 출생 체중
                            </span>
                            <div class="flex items-center gap-1">
                                <input type="number" id="birth-weight" step="0.01" min="0.5" max="6" placeholder="0.00"
                                       class="text-sm text-gray-600 outline-none bg-transparent text-right w-16 font-medium">
                                <span class="text-sm text-gray-400">kg</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between px-3 py-2.5">
                            <span class="text-sm font-bold text-gray-700 flex items-center gap-2">
                                <i class="fa-solid fa-scale-balanced text-green-500"></i> 현재 체중
                            </span>
                            <div class="flex items-center gap-2">
                                <input type="number" id="current-weight" step="0.01" min="1" max="30" placeholder="0.00"
                                       class="text-sm text-gray-600 outline-none bg-transparent text-right w-16 font-medium">
                                <span class="text-sm text-gray-400">kg</span>
                                <span id="weight-pct" class="text-xs font-bold px-2 py-0.5 rounded-full hidden"></span>
                            </div>
                        </div>
                        <div id="growth-weight-row" class="hidden px-3 py-2">
                            <p id="growth-weight-text" class="text-xs text-gray-500 leading-relaxed"><span></span></p>
                        </div>
                    </div>

                    <!-- 키 그룹 -->
                    <div class="bg-sky-50 rounded-xl border border-sky-100 divide-y divide-sky-100">
                        <div class="flex items-center justify-between px-3 py-2.5">
                            <span class="text-sm font-bold text-gray-700 flex items-center gap-2">
                                <i class="fa-solid fa-ruler-vertical text-sky-500"></i> 출생 키
                            </span>
                            <div class="flex items-center gap-1">
                                <input type="number" id="birth-height" step="0.1" min="30" max="65" placeholder="0.0"
                                       class="text-sm text-gray-600 outline-none bg-transparent text-right w-16 font-medium">
                                <span class="text-sm text-gray-400">cm</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between px-3 py-2.5">
                            <span class="text-sm font-bold text-gray-700 flex items-center gap-2">
                                <i class="fa-solid fa-child-reaching text-sky-500"></i> 현재 키
                            </span>
                            <div class="flex items-center gap-2">
                                <input type="number" id="current-height" step="0.1" min="30" max="120" placeholder="0.0"
                                       class="text-sm text-gray-600 outline-none bg-transparent text-right w-16 font-medium">
                                <span class="text-sm text-gray-400">cm</span>
                                <span id="height-pct" class="text-xs font-bold px-2 py-0.5 rounded-full hidden"></span>
                            </div>
                        </div>
                        <div id="growth-height-row" class="hidden px-3 py-2">
                            <p id="growth-height-text" class="text-xs text-gray-500 leading-relaxed"><span></span></p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden relative hide-scrollbar" id="content-container">

            <!-- 슬라이더 sticky strip -->
            <div class="sticky top-0 z-10 bg-gray-50 border-b border-gray-100">
                <div class="px-4 pt-2.5 pb-0.5 flex items-center gap-1.5">
                    <i class="fa-regular fa-rectangle-list text-yellow-500 text-xs"></i>
                    <span class="text-xs font-bold text-gray-500">개월별 발달 체크리스트 미리보기</span>
                </div>
            <div class="px-4 pb-2 flex items-center gap-2">
                <button id="btn-prev" class="w-7 h-7 shrink-0 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-400 hover:text-yellow-600 hover:border-yellow-300 active:scale-95 transition-all disabled:opacity-30 disabled:pointer-events-none">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                </button>
                <input type="range" id="month-slider" min="1" max="24" value="1"

                <button id="btn-next" class="w-7 h-7 shrink-0 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-400 hover:text-yellow-600 hover:border-yellow-300 active:scale-95 transition-all disabled:opacity-30 disabled:pointer-events-none">
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>

                    <span id="days-display" class="text-[11px] text-gray-400 block leading-tight"></span>
                </div>
            </div>
            </div>

            <!-- 다음 이정표 날짜 -->
            <div class="px-5 pt-1.5 pb-0.5">
                <span id="projected-date" class="text-[12px] text-blue-400 font-medium"></span>
            </div>
            <!-- Content will be injected here by JS -->
        </main>

        <!-- 챗봇 플로팅 버튼 -->
        <a href="/chatbot" class="absolute bottom-6 right-5 w-14 h-14 bg-purple-500 rounded-full shadow-lg flex items-center justify-center hover:bg-purple-600 active:scale-95 transition-all z-50">
            <i class="fa-solid fa-robot text-white text-xl"></i>
        </a>

    </div>

        // --- 2. State Management ---
        let currentMonth = 1;
        let currentGroupLabel = ''; 
        
        const checkedState = JSON.parse(localStorage.getItem('babyTrackerChecklist')) || {}; 
        function saveState() {
            localStorage.setItem('babyTrackerChecklist', JSON.stringify(checkedState));
        }

        // --- 공통 유틸 ---
        function getDaysAlive() {
            const bd = localStorage.getItem('babyTrackerBirthDate');
            if (!bd) return null;
            const days = Math.floor((new Date() - new Date(bd)) / 86400000);
            return days > 0 ? days : null;
        }

        if (savedBirthDate) birthDateInput.value = savedBirthDate;

        birthDateInput.addEventListener('change', (e) => {
            localStorage.setItem('babyTrackerBirthDate', e.target.value);
            const real = calculateRealMonth();
            if (real) changeMonth(real);
            updateProjectedDate();
            updateDaysDisplay();
            updateInfoSummary();
            updateGrowthVelocity();
        });

        const sexBtns = document.querySelectorAll('.sex-btn');

                        : (isSel ? 'bg-pink-500 text-white border-pink-500' : 'text-pink-400 border-pink-200 bg-pink-50'));
            });
        }

        sexBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                selectedSex = btn.dataset.sex;
                localStorage.setItem('babyTrackerSex', selectedSex);
                updateSexUI();
                updateInfoSummary();
                updatePercentileBadge(currentHeightInput, heightPctBadge, 'height');
                updatePercentileBadge(currentWeightInput, weightPctBadge, 'weight');
            });
        });
        updateSexUI();

        // 출생 체중 / 출생 키
        const birthWeightInput = document.getElementById('birth-weight');
        const birthHeightInput = document.getElementById('birth-height');
        const savedBirthWeight = localStorage.getItem('babyTrackerBirthWeight');
        const savedBirthHeight = localStorage.getItem('babyTrackerBirthHeight');
        if (savedBirthWeight) birthWeightInput.value = savedBirthWeight;
        if (savedBirthHeight) birthHeightInput.value = savedBirthHeight;

        birthWeightInput.addEventListener('change', (e) => {

        // --- 성장 백분위 계산 (WHO LMS 방법) ---
        // 출처: WHO Child Growth Standards (2006), 한국 2017 소아청소년 성장도표 채택 기준
        const WFA_BOYS = {0:[0.3487,3.3464,0.14602],1:[0.2297,4.4709,0.13395],2:[0.197,5.5675,0.12385],3:[0.1738,6.3762,0.11727],4:[0.1553,7.0023,0.11316],5:[0.1395,7.5105,0.1108],6:[0.1257,7.934,0.10958],7:[0.1134,8.297,0.10902],8:[0.1021,8.6151,0.10882],9:[0.0917,8.9014,0.10881],10:[0.082,9.1649,0.10891],11:[0.073,9.4122,0.10906],12:[0.0644,9.6479,0.10925],13:[0.0563,9.8749,0.10949],14:[0.0487,10.0953,0.10976],15:[0.0413,10.3108,0.11007],16:[0.0343,10.5228,0.11041],17:[0.0275,10.7319,0.11079],18:[0.0211,10.9385,0.11119],19:[0.0148,11.143,0.11164],20:[0.0087,11.3462,0.11211],21:[0.0029,11.5486,0.11261],22:[-0.0028,11.7504,0.11314],23:[-0.0083,11.9514,0.11369],24:[-0.0137,12.1515,0.11426]};
        const WFA_GIRLS = {0:[0.3809,3.2322,0.14171],1:[0.1714,4.1873,0.13724],2:[0.0962,5.1282,0.13],3:[0.0402,5.8458,0.12619],4:[-0.005,6.4237,0.12402],5:[-0.043,6.8985,0.12274],6:[-0.0756,7.297,0.12204],7:[-0.1039,7.6422,0.12178],8:[-0.1288,7.9487,0.12181],9:[-0.1507,8.2254,0.12199],10:[-0.17,8.48,0.12223],11:[-0.1872,8.7192,0.12247],12:[-0.2024,8.9481,0.12268],13:[-0.2158,9.1699,0.12283],14:[-0.2278,9.387,0.12294],15:[-0.2384,9.6008,0.12299],16:[-0.2478,9.8124,0.12303],17:[-0.2562,10.0226,0.12306],18:[-0.2637,10.2315,0.12309],19:[-0.2703,10.4393,0.12315],20:[-0.2762,10.6464,0.12323],21:[-0.2815,10.8534,0.12335],22:[-0.2862,11.0608,0.1235],23:[-0.2903,11.2688,0.12369],24:[-0.2941,11.4775,0.1239]};
        const LFA_BOYS = {0:[1,49.8842,0.03795],1:[1,54.7244,0.03557],2:[1,58.4249,0.03424],3:[1,61.4292,0.03328],4:[1,63.886,0.03257],5:[1,65.9026,0.03204],6:[1,67.6236,0.03165],7:[1,69.1645,0.03139],8:[1,70.5994,0.03124],9:[1,71.9687,0.03117],10:[1,73.2812,0.03118],11:[1,74.5388,0.03125],12:[1,75.7488,0.03137],13:[1,76.9186,0.03154],14:[1,78.0497,0.03174],15:[1,79.1458,0.03197],16:[1,80.2113,0.03222],17:[1,81.2487,0.0325],18:[1,82.2587,0.03279],19:[1,83.2418,0.0331],20:[1,84.1996,0.03342],21:[1,85.1348,0.03376],22:[1,86.0477,0.0341],23:[1,86.941,0.03445],24:[1,87.8161,0.03479]};
        const LFA_GIRLS = {0:[1,49.1477,0.0379],1:[1,53.6872,0.0364],2:[1,57.0673,0.03568],3:[1,59.8029,0.0352],4:[1,62.0899,0.03486],5:[1,64.0301,0.03463],6:[1,65.7311,0.03448],7:[1,67.2873,0.03441],8:[1,68.7498,0.0344],9:[1,70.1435,0.03444],10:[1,71.4818,0.03452],11:[1,72.771,0.03464],12:[1,74.015,0.03479],13:[1,75.2176,0.03496],14:[1,76.3817,0.03514],15:[1,77.5099,0.03534],16:[1,78.6055,0.03555],17:[1,79.671,0.03576],18:[1,80.7079,0.03598],19:[1,81.7182,0.0362],20:[1,82.7036,0.03643],21:[1,83.6654,0.03666],22:[1,84.604,0.03688],23:[1,85.5202,0.03711],24:[1,86.4153,0.03734]};

        function calcPercentile(x, ageMonths, sex, type) {
            const m = Math.round(ageMonths);
            const table = type === 'weight'
                ? (sex === 'male' ? WFA_BOYS : WFA_GIRLS)
                : (sex === 'male' ? LFA_BOYS : LFA_GIRLS);
            const lms = table[m];
            if (!lms) return null;
            const [L, M, S] = lms;
            const z = L === 0 ? Math.log(x / M) / S : (Math.pow(x / M, L) - 1) / (L * S);
            function erf(v) {
                const s = v >= 0 ? 1 : -1, a = Math.abs(v);
                const t = 1 / (1 + 0.3275911 * a);
                return s * (1 - t * (0.254829592 + t * (-0.284496736 + t * (1.421413741 + t * (-1.453152027 + t * 1.061405429)))) * Math.exp(-a * a));
            }
            return Math.round(0.5 * (1 + erf(z / Math.SQRT2)) * 100 * 10) / 10;
        }

        function pctBadge(pct) {
            const rank = Math.max(1, Math.round(100 - pct) + 1);
            let color;
            if (pct < 10)       color = 'bg-blue-100 text-blue-600';
            else if (pct < 25)  color = 'bg-sky-100 text-sky-600';
            else if (pct < 75)  color = 'bg-green-100 text-green-600';
            else if (pct < 90)  color = 'bg-orange-100 text-orange-600';
            else                color = 'bg-red-100 text-red-500';
            return { color, label: `100명 중 ${rank}등` };
        }

        // WHO 기준 누적 기대 성장량
        // 몸무게: WHO Child Growth Standards, Weight Velocity (2009)
        // 키: WHO Child Growth Standards, Length/Height Velocity (2009)
        const WHO_WEIGHT_PERIODS = [{upTo:90,rate:30},{upTo:180,rate:17},{upTo:365,rate:9}];
        // cm/일: 0-90일 3.5cm/월, 91-180일 2.0cm/월, 181-365일 1.5cm/월 (÷30.44)
        const WHO_HEIGHT_PERIODS = [{upTo:90,rate:0.115},{upTo:180,rate:0.066},{upTo:365,rate:0.049}];

        function expectedGain(days, periods) {
            let total = 0, prev = 0;
            for (const p of periods) {
                if (days <= prev) break;
                total += (Math.min(days, p.upTo) - prev) * p.rate;
                prev = p.upTo;
                if (days <= p.upTo) break;
            }
            return total;
        }

        function updateGrowthVelocity() {
            const days = getDaysAlive();
            const bw = parseFloat(birthWeightInput.value);
            const cw = parseFloat(currentWeightInput.value);
            const bh = parseFloat(birthHeightInput.value);
            const ch = parseFloat(currentHeightInput.value);

            // 체중
            const wRow = document.getElementById('growth-weight-row');
            const wLine = document.querySelector('#growth-weight-text span');
            if (bw && cw && days) {
                const actualG = (cw - bw) * 1000;
                const expG = expectedGain(days, WHO_WEIGHT_PERIODS);
                const apd = Math.round(actualG / days);
                const epd = Math.round(expG / days);
                const ratio = actualG / expG;
                const pct = Math.round((ratio - 1) * 100);
                const sign = pct >= 0 ? '+' : '';
                const [emoji, color, verdict] = ratio >= 0.9
                    ? ['🟢', 'text-green-600', '']
                    : ratio >= 0.7
                    ? ['🟡', 'text-yellow-500', ' · 조금 적은 편']
                    : ['🔴', 'text-red-500', ' · 소아과 상담 권장'];
                wLine.innerHTML = `하루 평균 <b>${apd}g</b>씩 성장 <span class="${color} font-bold">${emoji} ${sign}${pct}%</span> <span class="text-gray-400">vs. WHO 기준 ${epd}g/일</span>${verdict}`;
                wRow.classList.remove('hidden');
            } else {
                wRow.classList.add('hidden');
            }

            // 키
            const hRow = document.getElementById('growth-height-row');
            const hLine = document.querySelector('#growth-height-text span');
            if (bh && ch && days) {
                const actualCm = ch - bh;
                const expCm = expectedGain(days, WHO_HEIGHT_PERIODS);
                const apd = (actualCm / days).toFixed(2);
                const epd = (expCm / days).toFixed(2);
                const ratio = actualCm / expCm;
                const pct = Math.round((ratio - 1) * 100);
                const sign = pct >= 0 ? '+' : '';
                const [emoji, color, verdict] = ratio >= 0.9
                    ? ['🟢', 'text-green-600', '']
                    : ratio >= 0.7
                    ? ['🟡', 'text-yellow-500', ' · 조금 적은 편']
                    : ['🔴', 'text-red-500', ' · 소아과 상담 권장'];
                hLine.innerHTML = `하루 평균 <b>${apd}cm</b>씩 성장 <span class="${color} font-bold">${emoji} ${sign}${pct}%</span> <span class="text-gray-400">vs. WHO 기준 ${epd}cm/일</span>${verdict}`;
                hRow.classList.remove('hidden');
            } else {
                hRow.classList.add('hidden');
            }
        }

        function updatePercentileBadge(inputEl, badgeEl, type) {
            const val = parseFloat(inputEl.value);
            if (!val || !selectedSex) { badgeEl.classList.add('hidden'); return; }
            if (currentMonth < 0 || currentMonth > 24) { badgeEl.classList.add('hidden'); return; }
            const pct = calcPercentile(val, currentMonth, selectedSex, type);
            if (pct === null) { badgeEl.classList.add('hidden'); return; }
            const { color, label } = pctBadge(pct);
            badgeEl.className = `text-xs font-bold px-2 py-0.5 rounded-full ${color}`;
            badgeEl.textContent = label;
        }

        const currentHeightInput = document.getElementById('current-height');
        const currentWeightInput = document.getElementById('current-weight');
        const heightPctBadge = document.getElementById('height-pct');
        const weightPctBadge = document.getElementById('weight-pct');

        const savedHeight = localStorage.getItem('babyTrackerHeight');
        const savedWeight = localStorage.getItem('babyTrackerWeight');
        if (savedHeight) currentHeightInput.value = savedHeight;
        if (savedWeight) currentWeightInput.value = savedWeight;

        currentHeightInput.addEventListener('input', () => {
            localStorage.setItem('babyTrackerHeight', currentHeightInput.value);
            updatePercentileBadge(currentHeightInput, heightPctBadge, 'height');
            updateGrowthVelocity();
        });
        currentWeightInput.addEventListener('input', () => {
            localStorage.setItem('babyTrackerWeight', currentWeightInput.value);
            updatePercentileBadge(currentWeightInput, weightPctBadge, 'weight');
            updateGrowthVelocity();
        });

        // --- 접기/펼치기 ---
        const infoPanel = document.getElementById('info-panel');
        const infoChevron = document.getElementById('info-chevron');
        const infoCard = document.getElementById('info-toggle').parentElement;

        function applyInfoCardStyle(isOpen) {
            infoPanel.classList.toggle('hidden', !isOpen);
            infoChevron.classList.toggle('rotate-180', isOpen);
            if (isOpen) {
                infoCard.classList.remove('bg-yellow-400', 'border-yellow-400');
                infoCard.classList.add('bg-white', 'border-yellow-200');
                infoChevron.classList.replace('text-yellow-900', 'text-gray-400');
                document.getElementById('info-summary').classList.replace('text-yellow-900', 'text-gray-400');
            } else {
                infoCard.classList.remove('bg-white', 'border-yellow-200');
                infoCard.classList.add('bg-yellow-400', 'border-yellow-400');
                infoChevron.classList.replace('text-gray-400', 'text-yellow-900');
                document.getElementById('info-summary').classList.replace('text-gray-400', 'text-yellow-900');
            }
        }

        document.getElementById('info-toggle').addEventListener('click', () => {
            const isOpen = infoPanel.classList.contains('hidden');
            applyInfoCardStyle(isOpen);
        });

        applyInfoCardStyle(true); // 기본 펼침

        // 요약 텍스트 업데이트
        function updateInfoSummary() {
            const summary = document.getElementById('info-summary');
            const parts = [];
            if (selectedSex) parts.push(selectedSex === 'male' ? '남아' : '여아');
            const bw = localStorage.getItem('babyTrackerBirthWeight');
            const bh = localStorage.getItem('babyTrackerBirthHeight');
            if (bw && bh) parts.push(`출생 ${bh}cm · ${bw}kg`);
            else if (bw)  parts.push(`출생 ${bw}kg`);
            else if (bh)  parts.push(`출생 ${bh}cm`);
            const days = getDaysAlive();
            if (days) {
                const m = Math.floor(days / 30.44);
                const d = days - Math.round(m * 30.44);
                parts.push(`${m}개월 ${d > 0 ? d + '일' : ''} (${days}일)`);
            }
            summary.textContent = parts.length ? parts.join(' · ') + ' ✏️' : '생일을 입력해주세요 ✏️';
        }

        // 일수 표시
        function updateDaysDisplay() {
            const days = getDaysAlive();
            if (!days) { daysDisplay.textContent = ''; return; }
            const m = Math.floor(days / 30.44);
            const d = days - Math.round(m * 30.44);
            daysDisplay.textContent = `${d > 0 ? d + '일' : ''} · ${days}일째`;
        }

        function calculateRealMonth() {
            const saved = localStorage.getItem('babyTrackerBirthDate');
            if (!saved) return null;
            const birth = new Date(saved);
            const now = new Date();
            const months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
            if (months < 1) return null;
            return Math.min(months, 24);
        }

        function updateProjectedDate() {
            if (!birthDateInput.value) { projectedDateDisplay.textContent = ''; return; }
            const date = new Date(birthDateInput.value);
            date.setMonth(date.getMonth() + currentMonth);
            projectedDateDisplay.innerHTML = `<i class="fa-regular fa-calendar-check mr-1"></i>${date.getFullYear()}년 ${date.getMonth() + 1}월 무렵`;
        }


        // --- 3. DOM Elements & Buttons ---
        const slider = document.getElementById('month-slider');
        const monthDisplay = document.getElementById('month-display');
        const contentContainer = document.getElementById('content-container');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        // 버튼 상태 업데이트 함수
        function updateButtonStates() {
            btnPrev.disabled = currentMonth <= 1;
            btnNext.disabled = currentMonth >= 24;
        }

        // 공통 슬라이더 업데이트 로직
        function changeMonth(newMonth) {
            if (newMonth < 1) newMonth = 1;
            if (newMonth > 24) newMonth = 24;
            
            if (newMonth !== currentMonth) {
                let direction = 'init';
                if (newMonth > currentMonth) direction = 'prev'; // 종이 당기기 모델
                else if (newMonth < currentMonth) direction = 'next'; 

                currentMonth = newMonth;
                slider.value = currentMonth;
                monthDisplay.textContent = currentMonth;
                
                updateProjectedDate();
                updateButtonStates();

                const newData = milestoneData.find(m => m.range.includes(currentMonth));
                if (!newData) return;

                if (newData.label !== currentGroupLabel) {
                    currentGroupLabel = newData.label;
                    renderContent(newData, direction);
                }
            }
        }

        // 이벤트 리스너 바인딩
        slider.addEventListener('input', (e) => changeMonth(parseInt(e.target.value)));
        btnPrev.addEventListener('click', () => changeMonth(currentMonth - 1));
        btnNext.addEventListener('click', () => changeMonth(currentMonth + 1));

        // --- 4. Render HTML ---
        function renderContent(data, direction) {
            const sizeHtml = `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
                            <i class="fa-solid fa-weight-scale text-blue-400"></i> 평균 키 & 몸무게
                        </h2>
                        <span class="text-xs font-bold bg-yellow-100 text-yellow-700 px-2 py-1 rounded-md">${data.label} 기준</span>
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1 bg-blue-50 rounded-xl p-3 text-center">
                            <i class="fa-solid fa-mars text-blue-400 mb-1 text-lg"></i>
                            <div class="text-xs text-gray-500 mb-1">남아</div>
                            <div class="font-bold text-gray-700 text-sm">${data.size.boy}</div>
                        </div>
                        <div class="flex-1 bg-pink-50 rounded-xl p-3 text-center">
                            <i class="fa-solid fa-venus text-pink-400 mb-1 text-lg"></i>
                            <div class="text-xs text-gray-500 mb-1">여아</div>
                            <div class="font-bold text-gray-700 text-sm">${data.size.girl}</div>
                        </div>
                    </div>
                    <p class="text-[11px] text-gray-400 mt-3 text-center">* WHO 아동 성장 기준 (평균치이므로 개인차가 큽니다)</p>
                </div>
            `;

            const behaviorsHtml = `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5">
                    <h2 class="text-base font-bold text-gray-800 flex items-center gap-2 mb-3">
                        <i class="fa-solid fa-star text-yellow-400"></i> 핵심 행동 변화
                    </h2>
                    <ul class="space-y-3 mt-2">
                        ${data.behaviors.map(behavior => `
                            <li class="flex items-start gap-2 text-sm text-gray-700">
                                <i class="fa-solid fa-check text-green-400 mt-1 text-xs"></i>
                                <span>${behavior}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;

            const checklistHeader = `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5">
                    <h2 class="text-base font-bold text-gray-800 flex items-center gap-2 mb-4">
                        <i class="fa-regular fa-square-check text-purple-400"></i> 부모님 체크리스트
                    </h2>
                    <div class="space-y-3" id="checklist-items">
            `;
            
            let checklistItems = data.checklist.map(item => {
                const isChecked = checkedState[item.id] || false;
                return `
                    <label class="flex items-start gap-3 p-3 rounded-xl border ${isChecked ? 'bg-gray-50 border-gray-200' : 'bg-white border-gray-200'} cursor-pointer transition-colors duration-200">
                        <div class="relative flex items-center justify-center mt-0.5">
                            <input type="checkbox" class="checkbox-custom absolute opacity-0 w-0 h-0" 
                                   data-id="${item.id}" ${isChecked ? 'checked' : ''}>
                            <div class="w-5 h-5 border-2 rounded text-white flex items-center justify-center transition-colors duration-200 ${isChecked ? 'bg-green-500 border-green-500' : 'border-gray-300'}">
                                <svg class="w-3 h-3 ${isChecked ? 'opacity-100' : 'opacity-0'} transition-opacity duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                        </div>
                        <span class="text-sm flex-1 pt-0.5 transition-all duration-200 ${isChecked ? 'line-through-custom' : 'text-gray-700'}">
                            ${item.text}
                        </span>
                    </label>
                `;
            }).join('');

            const checklistFooter = `</div></div>`;

            const redFlagsHtml = data.redFlags && data.redFlags.length ? `
                <div class="bg-white rounded-2xl shadow-sm border border-amber-100 mb-10 overflow-hidden">
                    <button onclick="const c=this.nextElementSibling;c.classList.toggle('hidden');this.querySelector('.rf-chevron').classList.toggle('rotate-180')"
                            class="w-full p-5 flex items-center justify-between text-left">
                        <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
                            <i class="fa-solid fa-triangle-exclamation text-amber-400"></i> 이런 신호는 확인하세요
                        </h2>
                        <i class="fa-solid fa-chevron-down rf-chevron text-gray-400 text-sm transition-transform duration-200"></i>
                    </button>
                    <div class="hidden px-5 pb-5">
                        <p class="text-xs text-gray-500 mb-3">아래 신호가 보이면 소아과 상담을 권장해요</p>
                        <ul class="space-y-2">
                            ${data.redFlags.map(flag => `
                                <li class="flex items-start gap-2 text-sm text-gray-700">
                                    <i class="fa-solid fa-circle-exclamation text-amber-400 mt-0.5 text-xs shrink-0"></i>
                                    <span>${flag}</span>
                                </li>
                            `).join('')}
                        </ul>
                        <p class="text-[11px] text-gray-400 mt-4">출처: ${data.source}</p>
                    </div>
                </div>
            ` : '';

            const fullHtml = sizeHtml + behaviorsHtml + checklistHeader + checklistItems + checklistFooter + redFlagsHtml;

            animatePageTransition(fullHtml, direction);
        }

        // --- 5. 완벽하게 리팩토링된 DOM 최적화 애니메이션 ---
        function animatePageTransition(htmlString, direction) {
            
            // 1. 기존 화면 찾기
            const currentContainer = contentContainer.querySelector('.active-page');
            
            // 2. 새 화면 생성 (Static 상태로 추가되어 바로 높이를 확보함)
            const newPage = document.createElement('div');
            newPage.className = 'active-page w-full px-4';
            newPage.innerHTML = htmlString;

            // 초기 로딩 시 바로 렌더링
            if (direction === 'init') {
                newPage.style.animation = 'fadeIn 0.4s ease forwards';
                contentContainer.appendChild(newPage);
                bindCheckboxes(newPage);
                return;
            }

            // 3. 순수 CSS 키프레임을 이용한 애니메이션 제어
            // 기존 요소를 공중(Absolute)으로 띄워 새 요소와 겹치게 만듦 (Reflow 제거)
            if (currentContainer) {
                currentContainer.classList.remove('active-page');
                currentContainer.classList.add('absolute', 'top-0', 'left-0', 'w-full', 'px-4');
                
                // 방향에 따라 CSS 애니메이션 배정
                const ease = 'cubic-bezier(0.25, 1, 0.5, 1)';
                if (direction === 'next') {
                    currentContainer.style.animation = `slideOutLeft 0.4s ${ease} forwards`;
                    newPage.style.animation = `slideInRight 0.4s ${ease} forwards`;
                } else {
                    currentContainer.style.animation = `slideOutRight 0.4s ${ease} forwards`;
                    newPage.style.animation = `slideInLeft 0.4s ${ease} forwards`;
                }

                // 애니메이션이 끝나면 DOM에서 즉시 제거
                setTimeout(() => {
                    if (currentContainer.parentNode) currentContainer.remove();
                }, 400); 
            }

            contentContainer.appendChild(newPage);
            bindCheckboxes(newPage);
        }

        function bindCheckboxes(container) {
            const checkboxes = container.querySelectorAll('.checkbox-custom');
            checkboxes.forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = e.target.getAttribute('data-id');
                    checkedState[id] = e.target.checked;
                    saveState(); 

                    const label = cb.closest('label');
                    const textSpan = label.querySelector('span');
                    const boxDiv = label.querySelector('.border-2');
                    const svg = boxDiv.querySelector('svg');

                    if (e.target.checked) {
                        label.classList.replace('bg-white', 'bg-gray-50');
                        boxDiv.classList.replace('border-gray-300', 'border-green-500');
                        boxDiv.classList.add('bg-green-500');
                        svg.classList.replace('opacity-0', 'opacity-100');
                        textSpan.classList.replace('text-gray-700', 'line-through-custom');
                    } else {
                        label.classList.replace('bg-gray-50', 'bg-white');
                        boxDiv.classList.replace('border-green-500', 'border-gray-300');
                        boxDiv.classList.remove('bg-green-500');
                        svg.classList.replace('opacity-100', 'opacity-0');
                        textSpan.classList.replace('line-through-custom', 'text-gray-700');
                    }
                });
            });
        }

        // --- 6. Initialization ---
        const realMonth = calculateRealMonth();
        if (realMonth) {
            currentMonth = realMonth;
            slider.value = currentMonth;
            monthDisplay.textContent = currentMonth;
        }
        updateButtonStates();
        updateDaysDisplay();
        updateInfoSummary();
        updatePercentileBadge(currentHeightInput, heightPctBadge, 'height');
        updatePercentileBadge(currentWeightInput, weightPctBadge, 'weight');
        updateGrowthVelocity();
        const initData = milestoneData.find(m => m.range.includes(currentMonth)) || milestoneData[0];
        currentGroupLabel = initData.label;
        updateProjectedDate();
        renderContent(initData, 'init');

    </script>
</body>
</html>
